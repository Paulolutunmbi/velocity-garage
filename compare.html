<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Compare | Velocity Garage</title>
<link rel="icon" type="image/svg+xml" href="assets/images/default.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script>
tailwind.config = {
  darkMode: "class"
};
</script>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { font-family: "Plus Jakarta Sans", sans-serif; }
  .title-font { font-family: "Bebas Neue", sans-serif; letter-spacing: .05em; }
</style>
</head>

<body class="min-h-screen bg-slate-100 text-slate-900 transition-colors duration-300 dark:bg-slate-950 dark:text-slate-100">
<div class="pointer-events-none fixed inset-0 -z-10 bg-[radial-gradient(circle_at_20%_10%,rgba(255,91,46,0.16),transparent_30%),radial-gradient(circle_at_85%_70%,rgba(59,130,246,0.13),transparent_32%)]"></div>

<header class="sticky top-0 z-40 border-b border-slate-200/70 bg-white/80 px-4 py-3 backdrop-blur dark:border-slate-800 dark:bg-slate-950/80 sm:px-6">
  <div class="mx-auto flex w-full max-w-7xl flex-wrap items-center justify-between gap-3">
    <a href="index.html" class="group flex items-center gap-3">
      <img src="assets/images/default-monochrome-black.svg" alt="Velocity Garage logo" class="h-7 w-7 dark:hidden">
      <img src="assets/images/default-monochrome-white.svg" alt="Velocity Garage logo" class="hidden h-7 w-7 dark:block">
      <span class="text-lg font-extrabold uppercase tracking-[0.26em] text-slate-900 transition-colors group-hover:text-amber-700 dark:text-slate-100 dark:group-hover:text-amber-300">Velocity Garage</span>
    </a>
    <div class="flex items-center gap-2">
      <a href="index.html" class="rounded-full border border-amber-700/40 bg-white/75 px-4 py-2 text-sm font-semibold text-amber-800 transition hover:bg-amber-700 hover:text-white active:scale-[0.98] dark:bg-slate-900/70 dark:text-amber-300">Home</a>
      <a href="favorites.html" class="rounded-full border border-amber-700/40 bg-white/75 px-4 py-2 text-sm font-semibold text-amber-800 transition hover:bg-amber-700 hover:text-white active:scale-[0.98] dark:bg-slate-900/70 dark:text-amber-300">Favorites</a>
      <button id="theme-toggle" class="rounded-full border border-slate-300 p-2 transition hover:border-orange-500 dark:border-slate-700" aria-label="Toggle theme">
        <svg id="theme-icon" class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"></svg>
      </button>
    </div>
  </div>
</header>

<main class="mx-auto w-full max-w-7xl px-4 py-8 sm:px-6">
  <div class="mb-5 flex flex-wrap items-center justify-between gap-3">
    <h1 class="title-font text-5xl leading-none">Comparison Deck</h1>
    <div class="flex flex-wrap gap-2">
      <button id="clear-compare" class="rounded-full border border-amber-800/40 bg-amber-700/15 px-4 py-2 text-sm font-semibold text-amber-800 transition hover:bg-amber-700 hover:text-white active:scale-[0.98] dark:text-amber-300">Clear Compare</button>
      <a href="index.html" class="rounded-full border border-amber-700/40 bg-white/75 px-4 py-2 text-sm font-semibold text-amber-800 transition hover:bg-amber-700 hover:text-white active:scale-[0.98] dark:bg-slate-900/70 dark:text-amber-300">Add More Cars</a>
    </div>
  </div>

  <div id="compare-empty" class="hidden rounded-2xl border border-dashed border-slate-400/50 bg-white/70 p-8 text-center text-sm text-slate-600 dark:border-slate-700 dark:bg-slate-900/70 dark:text-slate-300">
    No cars selected for comparison. Add up to 3 cars from the home page.
  </div>

  <div id="compare-cards" class="mb-6 grid grid-cols-1 gap-4 md:grid-cols-2 xl:grid-cols-3"></div>

  <div id="compare-table-wrapper" class="hidden overflow-x-auto rounded-2xl border border-slate-200/80 bg-white/80 p-3 shadow-xl dark:border-slate-700 dark:bg-slate-900/70">
    <table class="min-w-full text-left text-sm">
      <thead>
        <tr id="compare-head"></tr>
      </thead>
      <tbody id="compare-body"></tbody>
    </table>
  </div>
</main>

<div id="notification" class="pointer-events-none fixed right-4 top-20 z-50 hidden rounded-xl bg-slate-950/95 px-4 py-2 text-sm font-semibold text-white shadow-xl dark:bg-slate-100 dark:text-slate-900"></div>

<script src="js/cars.js"></script>
<script src="js/compare-page.js"></script>
</body>
</html>
