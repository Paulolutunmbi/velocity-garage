<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Compare | Velocity Garage</title>
<link rel="icon" type="image/svg+xml" href="assets/images/default.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script>
tailwind.config = {};
</script>
<script src="https://cdn.tailwindcss.com"></script>
<script src="/env.js"></script>
<script type="module" src="/js/firebase-config.js"></script>
<style>
  body { font-family: "Plus Jakarta Sans", sans-serif; }
  .title-font { font-family: "Bebas Neue", sans-serif; letter-spacing: .05em; }
</style>
</head>

<body class="min-h-screen bg-gray-900 text-white transition-colors duration-300">
<div class="pointer-events-none fixed inset-0 -z-10 bg-[radial-gradient(circle_at_20%_10%,rgba(255,91,46,0.16),transparent_30%),radial-gradient(circle_at_85%_70%,rgba(59,130,246,0.13),transparent_32%)]"></div>
<div id="page-loading" class="fixed inset-0 z-50 flex items-center justify-center bg-slate-950/90">
  <div class="flex items-center gap-3 rounded-2xl border border-slate-700 bg-slate-900 px-5 py-4 text-sm text-slate-200">
    <span class="h-5 w-5 animate-spin rounded-full border-2 border-orange-400 border-t-transparent"></span>
    Loading compare list...
  </div>
</div>

<header class="sticky top-0 z-40 border-b border-slate-800/70 bg-slate-950/80 px-4 py-3 backdrop-blur sm:px-6 md:px-8">
  <div class="mx-auto flex w-full max-w-7xl flex-col items-start gap-3 sm:flex-row sm:items-center sm:justify-between">
    <a href="index.html" class="flex items-center">
      <!-- Dark-mode-only logo. -->
      <img id="site-logo" src="assets/images/default-monochrome-white.svg" alt="Velocity Garage logo" class="h-12 w-auto md:h-14 lg:h-16">
    </a>
    <div class="flex w-full flex-wrap items-center gap-2 sm:w-auto sm:justify-end sm:gap-3">
      <!-- Shared button treatment used across the app. -->
      <a href="home.html" class="rounded-lg bg-yellow-500 hover:bg-yellow-600 text-black font-semibold px-4 py-2 transition">Home</a>
      <a href="favorites.html" class="rounded-lg bg-yellow-500 hover:bg-yellow-600 text-black font-semibold px-4 py-2 transition">Favorites</a>
      <div id="auth-controls" class="flex flex-wrap items-center gap-2"></div>
    </div>
  </div>
</header>

<main class="mx-auto w-full max-w-7xl px-4 sm:px-6 md:px-8 py-8">
  <div class="mb-5 flex flex-wrap items-center justify-between gap-3">
    <h1 class="title-font text-5xl leading-none">Comparison Deck</h1>
    <div class="flex flex-wrap gap-2">
      <button id="clear-compare" class="rounded-lg bg-yellow-500 hover:bg-yellow-600 text-black font-semibold px-4 py-2 transition">Clear Compare</button>
      <a href="home.html" class="rounded-lg bg-yellow-500 hover:bg-yellow-600 text-black font-semibold px-4 py-2 transition">Add More Cars</a>
    </div>
  </div>

  <div id="compare-empty" class="hidden rounded-2xl border border-dashed border-slate-600/70 bg-slate-900/70 p-8 text-center text-sm text-slate-200">
    No cars selected for comparison. Add up to 3 cars from the home page.
  </div>

  <div id="compare-cards" class="mb-6 grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 md:gap-6"></div>

  <div id="compare-table-wrapper" class="hidden overflow-x-auto rounded-2xl border border-slate-700/80 bg-slate-900/70 p-3 shadow-xl">
    <table class="min-w-full text-left text-sm">
      <thead>
        <tr id="compare-head"></tr>
      </thead>
      <tbody id="compare-body"></tbody>
    </table>
  </div>
</main>

<div id="notification" class="pointer-events-none fixed right-4 top-20 z-50 hidden rounded-xl bg-slate-900 px-4 py-2 text-sm font-semibold text-white shadow-xl"></div>

<script src="js/cars.js"></script>
<script type="module">
import { checkAuth } from "./js/auth-guard.js";
import { initAuthNavbar } from "./js/navbar-auth.js";
import "./js/user-store.js";

checkAuth({ redirectTo: "index.html" })
  .then(() => {
    initAuthNavbar();
    const pageScript = document.createElement("script");
    pageScript.src = "js/compare-page.js";
    document.body.appendChild(pageScript);
  })
  .catch(() => {});
</script>
</body>
</html>
