<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Compare Cars</title>

<script src="https://cdn.tailwindcss.com"></script>

<script>
tailwind.config = { darkMode: 'class' }
</script>

</head>

<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-white">

<!-- NAV -->

<nav class="bg-black text-white p-4">
  <div class="max-w-7xl mx-auto flex justify-between">

    <h1 class="text-xl font-bold">Compare Cars</h1>

    <a href="index.html" class="bg-gray-700 px-4 py-2 rounded">
      ← Back
    </a>

  </div>
</nav>

<!-- CONTENT -->

<main class="max-w-7xl mx-auto p-6">

<h2 class="text-3xl font-bold mb-6">Comparison Table</h2>

<div id="compare-empty" class="text-gray-500">
  No cars selected for comparison.
</div>

<div id="compare-table-wrapper" class="hidden overflow-x-auto">

<table class="w-full border text-center">

<thead>
<tr id="compare-head">
  <th class="border p-2">Spec</th>
</tr>
</thead>

<tbody id="compare-body"></tbody>

</table>

</div>

</main>

<script src="js/cars.js"></script>
<script src="js/compare.js"></script>
<script src="js/compare-page.js"></script>

</body>
</html>
