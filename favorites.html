<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Favorites - Velocity Garage</title>

<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50 text-gray-900">

<!-- NAVBAR -->
<nav class="bg-black text-white p-4 shadow-md">
<div class="max-w-7xl mx-auto flex justify-between items-center">

<h1 class="text-2xl font-bold cursor-pointer" onclick="goHome()">
Velocity Garage
</h1>

<button
onclick="goHome()"
class="bg-blue-500 px-4 py-2 rounded hover:bg-blue-600">
Back to Home
</button>

</div>
</nav>

<!-- PAGE TITLE -->
<section class="max-w-7xl mx-auto p-6">

<h2 class="text-3xl font-bold mb-6">
Your Favorite Cars
</h2>

<div
id="favorites-container"
class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
</div>

<p
id="favorites-empty"
class="text-gray-500 text-center mt-10 hidden">
You haven't added any favorite cars yet.
</p>

</section>

<!-- CAR MODAL (same modal you already use) -->
<div
id="modal"
class="fixed inset-0 bg-black/40 hidden flex items-center justify-center z-50">

<div class="bg-white max-w-3xl w-full rounded-xl shadow-lg relative p-6">

<button
id="modal-close"
class="absolute top-4 right-4 text-red-600 text-3xl font-bold">
×
</button>

<h2 id="modal-name" class="text-2xl font-bold mb-4"></h2>

<img id="modal-image" class="w-full h-64 object-cover rounded mb-4">

<div class="grid grid-cols-2 gap-4 text-sm mb-4">

<p><strong>Brand:</strong> <span id="modal-brand"></span></p>
<p><strong>Country:</strong> <span id="modal-country"></span></p>
<p><strong>Horsepower:</strong> <span id="modal-hp"></span></p>
<p><strong>Top Speed:</strong> <span id="modal-speed"></span></p>
<p><strong>Price:</strong> <span id="modal-price"></span></p>

</div>

<p id="modal-desc" class="text-gray-700 mb-4"></p>

<div class="flex gap-4">

<button id="modal-compare"
class="bg-blue-500 text-white px-4 py-2 rounded">
Add to Compare
</button>

<button id="modal-fav"
class="bg-yellow-400 px-4 py-2 rounded">
Remove from Favorites
</button>

</div>

</div>
</div>

<script src="js/cars.js"></script>
<script src="js/favorites.js"></script>
<script src="js/compare.js"></script>
<script src="js/app.js"></script>

<script id="g4o9s8">
function goHome(){
  window.location.href = "index.html";
}
</script>

</body>
</html>
