<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Favorites | Velocity Garage</title>
<link rel="icon" type="image/svg+xml" href="assets/images/default.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script>
tailwind.config = {};
</script>
<script src="https://cdn.tailwindcss.com"></script>
<script src="/env.js"></script>
<script type="module" src="/js/firebase-config.js"></script>
<style>
  body { font-family: "Plus Jakarta Sans", sans-serif; }
  .title-font { font-family: "Bebas Neue", sans-serif; letter-spacing: .05em; }
</style>
</head>

<body class="min-h-screen bg-gray-900 text-white transition-colors duration-300">
<div class="pointer-events-none fixed inset-0 -z-10 bg-[radial-gradient(circle_at_85%_10%,rgba(255,91,46,0.15),transparent_28%),radial-gradient(circle_at_10%_80%,rgba(59,130,246,0.14),transparent_30%)]"></div>
<div id="page-loading" class="fixed inset-0 z-50 flex items-center justify-center bg-slate-950/90">
  <div class="flex items-center gap-3 rounded-2xl border border-slate-700 bg-slate-900 px-5 py-4 text-sm text-slate-200">
    <span class="h-5 w-5 animate-spin rounded-full border-2 border-orange-400 border-t-transparent"></span>
    Loading favorites...
  </div>
</div>

<header class="sticky top-0 z-40 border-b border-slate-800/70 bg-slate-950/80 px-4 py-3 backdrop-blur sm:px-6 md:px-8">
  <div class="mx-auto flex w-full max-w-7xl flex-col items-start gap-3 sm:flex-row sm:items-center sm:justify-between">
    <a href="index.html" class="flex items-center">
      <!-- Dark-mode-only logo. -->
      <img id="site-logo" src="assets/images/default-monochrome-white.svg" alt="Velocity Garage logo" class="h-12 w-auto md:h-14 lg:h-16">
    </a>
    <div class="flex w-full flex-col items-stretch gap-2 md:w-auto md:flex-row md:items-center md:justify-end md:gap-3">
      <!-- Shared button treatment used across the app. -->
      <a href="home.html" class="rounded-lg bg-yellow-500 hover:bg-yellow-600 text-black font-semibold px-4 py-2 transition">Home</a>
      <a href="compare.html" class="rounded-lg bg-yellow-500 hover:bg-yellow-600 text-black font-semibold px-4 py-2 transition">Compare</a>
      <div id="auth-controls" class="flex flex-wrap items-center gap-2"></div>
    </div>
  </div>
</header>

<main class="mx-auto w-full max-w-7xl px-4 sm:px-6 md:px-8 py-8">
  <div class="mb-5 flex flex-wrap items-center justify-between gap-3">
    <h1 class="title-font text-5xl leading-none">Your Favorite Cars</h1>
    <div id="compare-quick-info" class="rounded-full border border-blue-300/40 bg-blue-500/15 px-4 py-2 text-sm font-semibold text-blue-300"></div>
  </div>

  <div id="favorites-empty" class="hidden rounded-2xl border border-dashed border-slate-600/70 bg-slate-900/70 p-8 text-center text-sm text-slate-200">
    No favorites yet. Explore the fleet and add cars you love.
    <div class="mt-4">
      <a href="home.html" class="rounded-lg bg-yellow-500 hover:bg-yellow-600 text-black font-semibold px-4 py-2 transition">Browse Cars</a>
    </div>
  </div>

  <div id="favorites-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 md:gap-6"></div>
</main>

<div id="modal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/65 p-4">
  <div class="w-full max-w-3xl max-h-[90vh] overflow-y-auto rounded-3xl border border-white/10 bg-slate-950 p-5 text-slate-100 shadow-2xl">
    <div class="mb-4 flex items-start justify-between gap-4">
      <h2 id="modal-name" class="title-font text-5xl leading-none"></h2>
      <button id="modal-close" class="rounded-lg bg-yellow-500 hover:bg-yellow-600 text-black font-semibold px-4 py-2 transition" aria-label="Close details">
        <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
    </div>
    <div id="modal-carousel" class="relative mb-4 overflow-hidden rounded-2xl bg-slate-900/50">
      <div id="modal-carousel-track" class="flex h-64 transition-transform duration-500 ease-out"></div>
      <button id="modal-carousel-prev" class="absolute left-2 top-1/2 -translate-y-1/2 rounded-lg bg-yellow-500 hover:bg-yellow-600 text-black font-semibold px-4 py-2 transition" aria-label="Previous car image">
        <svg viewBox="0 0 24 24" class="h-4 w-4" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
      <button id="modal-carousel-next" class="absolute right-2 top-1/2 -translate-y-1/2 rounded-lg bg-yellow-500 hover:bg-yellow-600 text-black font-semibold px-4 py-2 transition" aria-label="Next car image">
        <svg viewBox="0 0 24 24" class="h-4 w-4" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
      </button>
      <div id="modal-carousel-dots" class="absolute bottom-3 left-1/2 flex -translate-x-1/2 gap-1.5"></div>
    </div>
    <div class="mb-4 grid grid-cols-2 gap-3 text-sm text-slate-200 sm:grid-cols-3">
      <p><span class="text-slate-400">Brand:</span> <span id="modal-brand"></span></p>
      <p><span class="text-slate-400">Maker:</span> <span id="modal-maker"></span></p>
      <p><span class="text-slate-400">Country:</span> <span id="modal-country"></span></p>
      <p><span class="text-slate-400">Horsepower:</span> <span id="modal-hp"></span></p>
      <p><span class="text-slate-400">Top Speed:</span> <span id="modal-speed"></span></p>
      <p><span class="text-slate-400">Price:</span> <span id="modal-price"></span></p>
    </div>
    <p id="modal-desc" class="text-sm text-slate-300"></p>
    <div class="mt-5 flex flex-wrap gap-3">
      <button id="modal-compare" class="rounded-lg bg-yellow-500 hover:bg-yellow-600 text-black font-semibold px-4 py-2 transition"></button>
      <button id="modal-fav" class="rounded-lg bg-yellow-500 hover:bg-yellow-600 text-black font-semibold px-4 py-2 transition"></button>
      <button id="modal-wishlist" class="rounded-lg bg-yellow-500 hover:bg-yellow-600 text-black font-semibold px-4 py-2 transition"></button>
    </div>
  </div>
</div>

<div id="notification" class="pointer-events-none fixed right-4 top-20 z-50 hidden rounded-xl bg-slate-900 px-4 py-2 text-sm font-semibold text-white shadow-xl"></div>

<script src="js/cars.js"></script>
<script type="module">
import { checkAuth } from "./js/auth-guard.js";
import { initAuthNavbar } from "./js/navbar-auth.js";
import "./js/user-store.js";

checkAuth({ redirectTo: "index.html" })
  .then(() => {
    initAuthNavbar();
    const pageScript = document.createElement("script");
    pageScript.src = "js/favorites-page.js";
    document.body.appendChild(pageScript);
  })
  .catch(() => {});
</script>
</body>
</html>
