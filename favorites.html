<!DOCTYPE html>
<html lang="en" class="dark scroll-smooth">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Favorites | Velocity Garage</title>
<link rel="icon" type="image/svg+xml" href="assets/images/default.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script>
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          vgBg: "#0b0b0d",
          vgSurface: "#121217",
          vgSurfaceAlt: "#1a1b22",
          vgLine: "#2a2b34",
          vgMuted: "#b0b4c2",
          vgPrimary: "#ff5d67",
          vgPrimarySoft: "#f7b2b6"
        },
        fontFamily: {
          display: ["Space Grotesk", "sans-serif"],
          body: ["Inter", "sans-serif"]
        }
      }
    }
  };
</script>
<script src="https://cdn.tailwindcss.com"></script>
<script src="/env.js"></script>
<script type="module" src="/js/firebase-config.js"></script>
<style>
  /* Stitch integration: page-level visual system for favorites only. */
  body { font-family: "Inter", sans-serif; }
  .display-font { font-family: "Space Grotesk", sans-serif; }
  .filter-select {
    background-color: #1a1b22;
    color: #e5e7eb;
  }
  .filter-select option {
    background-color: #121217;
    color: #e5e7eb;
  }
  .vg-grid-glow {
    background-image:
      radial-gradient(60% 55% at 12% 8%, rgba(255, 93, 103, 0.17), transparent 68%),
      radial-gradient(50% 50% at 88% 26%, rgba(57, 103, 255, 0.16), transparent 70%),
      linear-gradient(180deg, #0b0b0d 0%, #111218 65%, #101116 100%);
  }
  .vg-noise::before {
    content: "";
    position: absolute;
    inset: 0;
    pointer-events: none;
    opacity: 0.08;
    background-image: radial-gradient(rgba(255,255,255,0.45) 0.45px, transparent 0.45px);
    background-size: 3px 3px;
  }
  /* Stitch modal update: let carousel images fill the hero slot. */
  #modal-carousel-track > div { height: 100%; }
  #modal-carousel-track img { height: 100%; }
</style>
</head>

<body class="min-h-screen bg-vgBg text-white vg-grid-glow">
<!-- Stitch integration: preserved loading hook for favorites-page.js -->
<div id="page-loading" class="fixed inset-0 z-[70] flex items-center justify-center bg-black/80 backdrop-blur-sm">
  <div class="flex items-center gap-3 rounded-xl border border-vgLine bg-vgSurface px-5 py-4 text-sm text-vgMuted">
    <span class="h-5 w-5 animate-spin rounded-full border-2 border-vgPrimary border-t-transparent"></span>
    Loading favorites...
  </div>
</div>

<div class="pointer-events-none fixed inset-0 -z-10 bg-[linear-gradient(to_right,rgba(255,255,255,0.02)_1px,transparent_1px),linear-gradient(to_bottom,rgba(255,255,255,0.02)_1px,transparent_1px)] bg-[size:56px_56px]"></div>

<!-- Stitch integration: top app bar style while preserving auth mount and nav behavior. -->
<header class="fixed inset-x-0 top-0 z-50 border-b border-white/5 bg-black/55 backdrop-blur-xl">
  <nav class="mx-auto grid w-full max-w-7xl grid-cols-[auto_1fr_auto] items-center gap-3 px-4 py-3 sm:px-6 md:px-8">
    <a href="home.html" class="flex items-center">
      <img id="site-logo" src="assets/images/default-monochrome-white.svg" alt="Velocity Garage logo" class="h-8 w-auto">
    </a>

    <div class="hidden items-center justify-center gap-6 text-sm text-[#b0b4c2] md:flex">
      <a href="home.html" class="transition hover:text-white">Home</a>
      <a href="compare.html" class="transition hover:text-white">Compare</a>
      <a href="favorites.html" class="border-b border-[#ff5d67] pb-1 text-[#ff5d67]">Favorites</a>
      <a href="wishlist.html" class="transition hover:text-white">Wishlist</a>
    </div>

    <div class="flex items-center justify-end gap-3">
      <div id="auth-controls" class="flex flex-wrap items-center justify-end gap-2"></div>
    </div>
  </nav>

  <div class="mx-auto flex w-full max-w-7xl items-center justify-center gap-5 overflow-x-auto px-4 pb-3 text-xs font-semibold uppercase tracking-[0.16em] text-[#b0b4c2] md:hidden sm:px-6">
    <a href="home.html" class="whitespace-nowrap transition hover:text-white">Home</a>
    <a href="compare.html" class="whitespace-nowrap transition hover:text-white">Compare</a>
    <a href="favorites.html" class="whitespace-nowrap border-b border-[#ff5d67] pb-1 text-[#ff5d67]">Favorites</a>
    <a href="wishlist.html" class="whitespace-nowrap transition hover:text-white">Wishlist</a>
  </div>
</header>

<main class="relative mx-auto min-h-screen w-full max-w-7xl px-4 pb-20 pt-32 sm:px-6 md:px-8 md:pt-32">
  <!-- Stitch integration: hero and KPI strip using existing compare status hook. -->
  <section class="mb-10">
    <div class="flex flex-col gap-8 lg:flex-row lg:items-end lg:justify-between">
      <div>
        <p class="mb-4 text-xs font-semibold uppercase tracking-[0.35em] text-vgPrimarySoft">Personal Vault</p>
        <h1 class="display-font text-5xl font-bold uppercase leading-[0.9] tracking-tight sm:text-6xl md:text-7xl">My Collection</h1>
        <div class="mt-6 flex flex-wrap items-center gap-3">
          <span id="saved-count" class="rounded-full bg-vgPrimary/20 px-3 py-1 text-xs font-semibold uppercase tracking-[0.16em] text-vgPrimary">0 Saved</span>
          <span class="h-px w-16 bg-vgLine"></span>
          <span id="compare-quick-info" class="text-xs font-semibold uppercase tracking-[0.2em] text-vgMuted"></span>
        </div>
      </div>

      <div class="flex flex-wrap gap-2">
        <!-- Stitch integration: filter controls converted to dropdown selectors. -->
        <label class="relative">
          <span class="sr-only">Filter by brand</span>
          <select id="filter-brand" class="filter-select appearance-none rounded-md border border-vgLine px-3 py-2 pr-8 text-xs font-semibold uppercase tracking-[0.14em] transition focus:border-vgPrimary focus:outline-none">
            <option value="all">Brand: All</option>
          </select>
          <span class="pointer-events-none absolute right-2 top-1/2 -translate-y-1/2 text-vgMuted">▾</span>
        </label>

        <label class="relative">
          <span class="sr-only">Filter by price</span>
          <select id="filter-price" class="filter-select appearance-none rounded-md border border-vgLine px-3 py-2 pr-8 text-xs font-semibold uppercase tracking-[0.14em] transition focus:border-vgPrimary focus:outline-none">
            <option value="all">Price: All</option>
            <option value="under-300k">Under $300k</option>
            <option value="300k-1m">$300k - $1m</option>
            <option value="over-1m">Over $1m</option>
          </select>
          <span class="pointer-events-none absolute right-2 top-1/2 -translate-y-1/2 text-vgMuted">▾</span>
        </label>

        <label class="relative">
          <span class="sr-only">Filter by performance</span>
          <select id="filter-performance" class="filter-select appearance-none rounded-md border border-vgLine px-3 py-2 pr-8 text-xs font-semibold uppercase tracking-[0.14em] transition focus:border-vgPrimary focus:outline-none">
            <option value="all">Performance: All</option>
            <option value="street">Street</option>
            <option value="track">Track</option>
            <option value="hyper">Hyper</option>
          </select>
          <span class="pointer-events-none absolute right-2 top-1/2 -translate-y-1/2 text-vgMuted">▾</span>
        </label>
      </div>
    </div>
  </section>

  <!-- Stitch integration: kept empty-state hook id used by existing page script. -->
  <section id="favorites-empty" class="hidden rounded-2xl border border-dashed border-vgLine bg-vgSurface/85 p-8 text-center">
    <p class="text-sm text-vgMuted">No favorites yet. Explore the fleet and add cars you love.</p>
    <div class="mt-4">
      <a href="home.html" class="inline-flex rounded-lg bg-vgPrimary px-4 py-2 text-sm font-semibold text-black transition hover:brightness-110">Browse Cars</a>
    </div>
  </section>

  <!-- Stitch integration: rendering target preserved for favorites-page.js. -->
  <section id="favorites-container" class="grid grid-cols-1 gap-5 md:grid-cols-2 lg:grid-cols-3"></section>
</main>

<div id="modal-root"></div>

<!-- Stitch integration: preserved notification hook id for in-page toasts. -->
<div id="notification" class="pointer-events-none fixed right-4 top-20 z-[65] hidden rounded-lg border border-vgLine bg-vgSurface px-4 py-2 text-sm font-semibold text-white shadow-lg"></div>

<script src="js/cars.js"></script>
<script src="utils/helpers.js"></script>
<script src="utils/firebase.js"></script>
<script src="components/Button.js"></script>
<script src="components/Card.js"></script>
<script src="components/Modal.js"></script>
<script type="module">
import { checkAuth } from "./js/auth-guard.js";
import { initAuthNavbar } from "./js/navbar-auth.js";
import "./js/user-store.js";

checkAuth({ redirectTo: "index.html" })
  .then(() => {
    initAuthNavbar();
    const pageScript = document.createElement("script");
    pageScript.src = "js/favorites-page.js";
    document.body.appendChild(pageScript);
  })
  .catch(() => {});
</script>
</body>
</html>
