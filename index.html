<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Velocity Garage</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body class="bg-gray-100">
    <header class="bg-gray-900 text-white p-6 text-center text-3xl font-bold">
      Velocity Garage
    </header>

    <main class="p-6 max-w-6xl mx-auto">
      <!-- Search -->
      <div class="mb-6">
        <input
          type="text"
          id="search"
          placeholder="Search cars..."
          class="w-full p-3 rounded shadow border focus:outline-none focus:ring focus:ring-blue-400"
        />
      </div>

      <!-- Notification -->
      <div
        id="notification"
        class="fixed top-0 left-1/2 -translate-x-1/2 -translate-y-full bg-white text-gray-800 px-6 py-3 rounded shadow-lg flex items-center gap-2 transition-all duration-500 z-50"
      ></div>

      <!-- Compare Bar -->
      <div
        id="compare-bar"
        class="fixed bottom-0 left-0 w-full bg-gray-900 text-white p-4 hidden z-40"
      ></div>

      <!-- Cars container -->
      <div
        id="cars-container"
        class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"
      ></div>
      <!-- Car Details Modal -->
      <div
        id="modal"
        class="fixed inset-0 hidden z-50 flex items-center justify-center"
      >
        <div
          class="bg-white rounded-lg shadow-lg max-w-3xl w-full relative p-6 transform transition-transform scale-95 opacity-0"
        >
          <!-- Close Button -->
          <button
            id="modal-close"
            class="absolute top-4 right-4 text-red-600 text-3xl font-bold px-3 py-1 rounded hover:bg-red-100 transition"
          >
            &times;
          </button>

          <!-- Modal Content -->
          <div class="flex flex-col md:flex-row gap-6">
            <img
              id="modal-image"
              src=""
              alt="Car Image"
              class="w-full md:w-1/2 h-64 object-cover rounded"
            />

            <div class="flex-1 space-y-2">
              <h2 id="modal-name" class="text-2xl font-bold"></h2>
              <p><strong>Brand:</strong> <span id="modal-brand"></span></p>
              <p><strong>Maker:</strong> <span id="modal-maker"></span></p>
              <p><strong>Country:</strong> <span id="modal-country"></span></p>
              <p><strong>Horsepower:</strong> <span id="modal-hp"></span> ⚡</p>
              <p><strong>Speed:</strong> <span id="modal-speed"></span> 🏎️</p>
              <p>
                <strong>Price:</strong>
                <span id="modal-price" class="text-blue-600 font-bold"></span>
              </p>
              <p id="modal-desc" class="text-gray-700"></p>

              <!-- Buttons inside modal -->
              <div class="flex gap-3 mt-4">
                <button
                  id="modal-compare"
                  class="bg-gray-200 px-3 py-1 rounded hover:scale-110 transition flex items-center gap-1"
                >
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    width="22"
                    height="22"
                    viewBox="0 0 24 24"
                  >
                    <path
                      fill="currentColor"
                      d="M13 12h7v1.5a.5.5 0 0 1-1 0V13h-5v3.5a2.5 2.5 0 0 0 5 0V15a.5.5 0 0 1 1 0v1.5a3.5 3.5 0 0 1-7 0V12zm-9 0h7v4.5a3.5 3.5 0 0 1-7 0V15a.5.5 0 0 1 1 0v1.5a2.5 2.5 0 0 0 5 0V13H5v.5a.5.5 0 0 1-1 0V12zm9-2V3.5a.5.5 0 0 0-1 0V10H4a1 1 0 0 0-1 1v1h18v-1a1 1 0 0 0-1-1h-8z"
                    />
                  </svg>
                  Add to Compare
                </button>

                <button
                  id="modal-fav"
                  class="bg-gray-200 px-3 py-1 rounded hover:scale-110 transition flex items-center gap-1"
                >
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    width="20"
                    height="20"
                    viewBox="0 0 16 16"
                  >
                    <path
                      fill="currentColor"
                      d="M7.99 0L.98 9.38L7 8.96L2.04 16L15 6l-7.01.47L15 0z"
                    />
                  </svg>
                  Add to Favorites
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <script src="js/cars.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
