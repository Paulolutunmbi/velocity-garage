<!DOCTYPE html>
<html class="dark" lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password | Velocity Garage</title>
  <link rel="icon" type="image/svg+xml" href="assets/images/default.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,400;0,700;1,400;1,700&family=Manrope:wght@300;400;600;700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            background: "#121212",
            surface: "#171717",
            surfaceSoft: "#1f1f1f",
            outline: "#303030",
            primary: "#d2d2d2",
            tertiary: "#ff8f72",
            onBackground: "#e6e2e0",
            onMuted: "#9a9a9a"
          },
          fontFamily: {
            headline: ["Newsreader", "serif"],
            body: ["Manrope", "sans-serif"],
            label: ["Space Grotesk", "sans-serif"]
          }
        }
      }
    };
  </script>
  <style>
    .glass-effect {
      backdrop-filter: blur(20px);
      background: rgba(18, 18, 18, 0.72);
    }
  </style>
</head>
<body class="min-h-screen bg-background text-onBackground font-body selection:bg-tertiary/70 selection:text-black">
  <main class="relative flex min-h-screen items-center justify-center overflow-hidden p-5 sm:p-6 md:p-10">
    <img src="https://lh3.googleusercontent.com/aida-public/AB6AXuAcZNbJq-C3V4xPgdIuC_4NwydFOOs6LKgNs-H5V3FQMgjavqxMCKTW4WmLcViuxDwFMOdrPg25I5zeZ6VS0kVKhC5daG3AggE7d15ux2-MOS0nVAwywRP8KgXR-P8L87SZ57w8Dx5AlUPFJDvp81LvmCk6BKcbx6tPLzhTbilC8WIZAHpEAxVRU9HseRGcDX7mkRQ1Aeh1mFfvI_GeTXtQ5v83GgsZSlIqHYRcozJBIe7jQA5eDbXdBorpGWZWj9tmbQ5uXMnZangA" alt="Garage backdrop" class="absolute inset-0 -z-20 h-full w-full object-cover opacity-35 grayscale">
    <div class="absolute inset-0 -z-10 bg-gradient-to-b from-background/70 via-background/84 to-background/95"></div>
    <div class="absolute inset-0 -z-10 bg-[radial-gradient(circle_at_78%_14%,rgba(255,143,114,0.16),transparent_34%),radial-gradient(circle_at_16%_90%,rgba(115,115,115,0.2),transparent_38%)]"></div>

    <section class="w-full max-w-lg rounded-lg border border-outline/70 p-6 shadow-2xl glass-effect sm:p-8">
      <img src="assets/images/screen-removebg-preview.png" alt="Velocity Garage Logo" class="mb-4 h-auto w-44 max-w-full object-contain sm:w-48">
      <h1 class="font-headline text-5xl italic leading-tight text-onBackground sm:text-6xl">Set New Password</h1>
      <p class="mt-3 text-sm text-onBackground/80">Create a new password for your account to complete reset.</p>

      <div id="reset-success" class="mt-5 hidden rounded border border-emerald-400/60 bg-emerald-500/10 px-3 py-2 text-sm text-emerald-200"></div>
      <div id="reset-error" class="mt-5 hidden rounded border border-red-500/60 bg-red-500/10 px-3 py-2 text-sm text-red-200"></div>

      <form id="reset-password-form" class="mt-5 space-y-5" novalidate>
        <div>
          <label for="reset-new-password" class="mb-2 block font-label text-[11px] uppercase tracking-[0.2em] text-onMuted">New Password</label>
          <div class="relative">
            <input id="reset-new-password" name="newPassword" type="password" autocomplete="new-password" required class="w-full rounded-md border border-outline bg-surfaceSoft px-3 py-3 pr-14 text-sm text-onBackground placeholder:text-onMuted/40 focus:border-tertiary focus:ring-0" aria-describedby="reset-new-password-error">
            <button id="toggle-reset-new-password" type="button" class="absolute right-2 top-1/2 -translate-y-1/2 rounded px-2 py-1 text-xs font-semibold text-onMuted transition-colors hover:text-onBackground" aria-label="Show new password" aria-pressed="false">
              Show
            </button>
          </div>
          <p id="reset-new-password-error" class="mt-2 hidden text-xs text-red-300"></p>
        </div>

        <div>
          <label for="reset-confirm-password" class="mb-2 block font-label text-[11px] uppercase tracking-[0.2em] text-onMuted">Confirm Password</label>
          <div class="relative">
            <input id="reset-confirm-password" name="confirmPassword" type="password" autocomplete="new-password" required class="w-full rounded-md border border-outline bg-surfaceSoft px-3 py-3 pr-14 text-sm text-onBackground placeholder:text-onMuted/40 focus:border-tertiary focus:ring-0" aria-describedby="reset-confirm-password-error">
            <button id="toggle-reset-confirm-password" type="button" class="absolute right-2 top-1/2 -translate-y-1/2 rounded px-2 py-1 text-xs font-semibold text-onMuted transition-colors hover:text-onBackground" aria-label="Show confirm password" aria-pressed="false">
              Show
            </button>
          </div>
          <p id="reset-confirm-password-error" class="mt-2 hidden text-xs text-red-300"></p>
        </div>

        <button id="reset-submit" type="submit" class="w-full rounded-md bg-primary py-3 font-label text-xs font-bold uppercase tracking-[0.2em] text-black transition-all duration-300 hover:bg-tertiary active:scale-[0.99]">
          Update Password
        </button>
      </form>

      <div class="mt-6 text-center">
        <a href="/login.html" class="font-label text-[11px] uppercase tracking-widest text-tertiary transition-colors hover:text-[#ffb39f]">Back to Login</a>
      </div>
    </section>
  </main>

  <script src="/env.js"></script>
  <script type="module" src="/js/firebase-config.js"></script>
  <script type="module" src="/js/reset-password-page.js"></script>
</body>
</html>
